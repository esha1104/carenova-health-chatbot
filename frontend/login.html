<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login - CareNova</title>
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet" />
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <style>
        /* Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            font-family: 'Arial', sans-serif;
            background-color: #FAFAFF;
            color: #30343F;
            height: 100%;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: #1E2749;
            color: #FAFAFF;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #E4D9FF;
            text-decoration: none;
        }

        header nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        header nav a {
            text-decoration: none;
            color: #FAFAFF;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        header nav a:hover {
            color: #E4D9FF;
        }

        /* Main Container */
        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 80px);
            padding: 40px 20px;
            background: linear-gradient(135deg, #f5f7ff 0%, #f9f9fc 100%);
        }

        /* Login Card */
        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 50px 40px;
            max-width: 450px;
            width: 100%;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card h2 {
            font-size: 28px;
            color: #1E2749;
            margin-bottom: 10px;
            text-align: center;
        }

        .login-card-subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Tab Navigation */
        .tab-navigation {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            border-bottom: 2px solid #E4D9FF;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 0;
            background: none;
            border: none;
            color: #30343F;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab-btn.active {
            color: #1E2749;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: #1E2749;
        }

        /* Form Group */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1E2749;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #E4D9FF;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #1E2749;
            box-shadow: 0 0 0 3px rgba(30, 39, 73, 0.1);
        }

        .form-group input::placeholder {
            color: #999;
        }

        /* Buttons */
        .login-btn, .back-btn {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn {
            background-color: #1E2749;
            color: white;
        }

        .login-btn:hover {
            background-color: #273469;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30, 39, 73, 0.3);
        }

        .login-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .back-btn {
            background-color: transparent;
            color: #1E2749;
            border: 1px solid #E4D9FF;
        }

        .back-btn:hover {
            background-color: #f5f5f5;
        }

        /* Messages */
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .message.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        /* Form Sections */
        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        /* Back to home link */
        .back-home {
            text-align: center;
            margin-top: 20px;
        }

        .back-home a {
            color: #1E2749;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .back-home a:hover {
            color: #E4D9FF;
        }

        /* Loading State */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #1E2749;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            header {
                flex-direction: column;
                padding: 15px;
                gap: 15px;
                text-align: center;
            }

            header nav ul {
                flex-direction: column;
                gap: 10px;
            }

            .login-card {
                padding: 30px 20px;
            }

            .main-container {
                min-height: calc(100vh - 120px);
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <a href="index.html" class="logo">CareNova</a>
        <nav>
            <ul>
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#features">Features</a></li>
                <li><a href="index.html#about">About</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Login Card -->
        <div class="login-card">
            <h2>Secure Login</h2>
            <p class="login-card-subtitle">Access your personalized health assistant with a secure passwordless login</p>

            <!-- Message Display -->
            <div id="message" class="message"></div>

            <!-- Email Form -->
            <div class="form-section active" id="email-section">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="Enter your email" 
                        required
                    />
                </div>
                <button class="login-btn" onclick="sendEmailLink()" id="sendBtn">
                    Send Secure Login Link
                </button>
                <p style="text-align: center; margin-top: 15px; color: #666; font-size: 12px;">
                    We'll send you a secure link to your email. No password required.
                </p>
            </div>

            <!-- Back to Home -->
            <div class="back-home">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBVNU3qsMJs6diyrmG9kax6Dz391JSKQDg",
            authDomain: "otpp-9bb28.firebaseapp.com",
            projectId: "otpp-9bb28",
            storageBucket: "otpp-9bb28.appspot.com",
            messagingSenderId: "714490495421",
            appId: "1:714490495421:web:60b8b690d08a51812712d4"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Show message
        function showMessage(text, type = 'info') {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            messageEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // Send email login link
        function sendEmailLink() {
            const emailInput = document.getElementById('email');
            const email = emailInput.value.trim();
            const sendBtn = document.getElementById('sendBtn');

            // Validate email using regex pattern
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email || !emailRegex.test(email)) {
                showMessage('Please enter a valid email address (e.g., user@example.com)', 'error');
                emailInput.focus();
                return;
            }

            // Disable button and show loading
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="loading"></span>Sending...';

            const actionCodeSettings = {
                url: window.location.href,
                handleCodeInApp: true
            };

            auth.sendSignInLinkToEmail(email, actionCodeSettings)
                .then(() => {
                    localStorage.setItem('emailForSignIn', email);
                    showMessage(
                        `✓ Login link sent to ${email}! Check your inbox and click the link to sign in.`,
                        'success'
                    );
                    document.getElementById('email').value = '';
                    sendBtn.disabled = false;
                    sendBtn.innerHTML = 'Send Secure Login Link';
                })
                .catch((error) => {
                    showMessage(`Error: ${error.message}`, 'error');
                    sendBtn.disabled = false;
                    sendBtn.innerHTML = 'Send Secure Login Link';
                });
        }

        // Function to complete sign-in process
        function completeSignIn(emailAddress) {
            if (!emailAddress) return;
            
            auth.signInWithEmailLink(emailAddress, window.location.href)
                .then(() => {
                    localStorage.removeItem('emailForSignIn');
                    showMessage('✓ Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                })
                .catch((error) => {
                    showMessage(`Sign in error: ${error.message}`, 'error');
                });
        }

        // Function to show email confirmation UI
        function showEmailConfirmation() {
            const emailSection = document.getElementById('email-section');
            
            // Create confirmation UI
            const confirmHTML = `
                <div style="background-color: #d1ecf1; border: 1px solid #bee5eb; border-radius: 8px; padding: 15px; margin-bottom: 20px;">
                    <p style="margin: 0 0 10px 0; color: #0c5460; font-size: 14px;">
                        <strong>Email confirmation needed:</strong> We don't have your email on file. Please enter the email address you used to receive the login link.
                    </p>
                    <div class="form-group" style="margin-bottom: 0;">
                        <input 
                            type="email" 
                            id="confirmEmail" 
                            placeholder="Enter your email address" 
                            style="width: 100%; padding: 12px 15px; border: 1px solid #bee5eb; border-radius: 8px; font-size: 14px; font-family: inherit; margin-bottom: 10px;"
                            required
                        />
                        <button 
                            onclick="handleEmailConfirmation()" 
                            style="width: 100%; padding: 12px; background-color: #1E2749; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s ease;"
                        >
                            Confirm & Complete Sign In
                        </button>
                    </div>
                </div>
            `;
            
            emailSection.innerHTML = confirmHTML + emailSection.innerHTML;
        }

        // Handle email confirmation
        function handleEmailConfirmation() {
            const confirmEmail = document.getElementById('confirmEmail');
            if (!confirmEmail) return;
            
            const email = confirmEmail.value.trim();
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (!email || !emailRegex.test(email)) {
                showMessage('Please enter a valid email address', 'error');
                confirmEmail.focus();
                return;
            }
            
            completeSignIn(email);
        }

        // Check if user clicked email link
        if (auth.isSignInWithEmailLink(window.location.href)) {
            let email = localStorage.getItem('emailForSignIn');

            if (email) {
                // Email is available, proceed with sign-in
                completeSignIn(email);
            } else {
                // Email not found, show confirmation UI instead of prompt
                showEmailConfirmation();
            }
        }

        // Allow Enter key to send link
        document.getElementById('email').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendEmailLink();
            }
        });

        // Allow Enter key for email confirmation (after DOM is ready)
        setTimeout(() => {
            const confirmEmail = document.getElementById('confirmEmail');
            if (confirmEmail) {
                confirmEmail.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        handleEmailConfirmation();
                    }
                });
            }
        }, 100);
    </script>
</body>
</html>
